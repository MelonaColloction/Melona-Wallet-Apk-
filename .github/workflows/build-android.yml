name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            openjdk-17-jdk \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            build-essential \
            git \
            wget \
            unzip \
            libffi-dev \
            libssl-dev \
            liblzma-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade setuptools wheel
          pip install cython
          pip install buildozer

      - name: Debug - Check files
        run: |
          ls -la
          cat buildozer.spec

      - name: Build with Buildozer
        run: |
          rm -rf ~/.buildozer/cache/
          rm -rf ~/.buildozer/android/platform/
          buildozer android debug
        env:
          GRADLE_OPTS: "-Xmx2048m -Xms256m"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: melona-wallet-apk
          path: ./bin/*.apk
